<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛股计算器终极白色版 - 修复实时刷新版</title>

<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus"></script>

<style>
body{
background:#f4f6fb;
margin:0;
padding:14px;
font-family:Inter,"Helvetica Neue",Arial;
height:100vh;
box-sizing:border-box;
overflow:hidden;
color:#303133;
}

#app{
height:100%;
display:flex;
flex-direction:column;
}

.app-container{
flex:1;
display:flex;
flex-direction:column;
background:#ffffff;
padding:20px;
border-radius:18px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
overflow:hidden;
border:1px solid #eef1f6;
}

.header-box{
margin-bottom:20px;
padding-bottom:14px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ebeef5;
}

.header-box h2{
margin:0;
font-size:22px;
background:linear-gradient(90deg,#409eff,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.toolbar{
margin-bottom:15px;
display:flex;
gap:12px;
}

.el-table{
background:#fff !important;
color:#303133;
}

.el-table th{
background:#f5f7fa !important;
color:#606266 !important;
font-weight:600;
border-bottom:1px solid #ebeef5;
}

.el-table tr{
background:#fff !important;
transition:all .2s ease;
}

.el-table tr:hover td{
background:#f5f7fa !important;
}

/* 预警颜色 */
.el-table .warning-row td{
background:rgba(250,173,20,0.08) !important;
color:#e6a23c !important;
}

.el-table .danger-row td{
background:rgba(245,108,108,0.1) !important;
color:#f56c6c !important;
}

.price-now{
font-weight:800;
font-size:16px;
}

.price-up{ color:#f56c6c; }
.price-down{ color:#67c23a; }

.fib-val{
font-family:JetBrains Mono,Consolas,monospace;
font-size:13px;
font-weight:600;
color:#409eff;
}

.red-text{ color:#f56c6c; font-weight:700; }
.green-text{ color:#67c23a; font-weight:700; }

.market-tag{
font-size:10px;
padding:2px 6px;
border-radius:8px;
margin-right:6px;
font-weight:600;
}

.tag-sh{background:#fff1f0;color:#f56c6c;border:1px solid #fde2e2;}
.tag-sz{background:#ecf5ff;color:#409eff;border:1px solid #d9ecff;}
.tag-hk{background:#f0f9eb;color:#67c23a;border:1px solid #e1f3d8;}
.tag-bj{background:#fdf6ec;color:#e6a23c;border:1px solid #faecd8;}

.el-button--primary{
background:linear-gradient(90deg,#409eff,#6366f1);
border:none;
}
</style>
</head>

<body>
<div id="app">
    <div class="app-container">
        <div class="header-box">
            <div>
                <h2>牛股计算器 <small style="font-size:12px;font-weight:normal;color:#999;margin-left:10px">v5.1 Fixed</small></h2>
                <p style="margin:5px 0 0;font-size:13px;color:#909399">
                    自动刷新：10秒 (最后更新: {{ lastUpdateTime }})
                </p>
            </div>
            <div>
                <el-button-group>
                    <el-button type="primary" @click="refreshAllPrices" :loading="loading">强制刷新</el-button>
                    <el-button type="danger" @click="clearAll">清空</el-button>
                </el-button-group>
            </div>
        </div>

        <div class="toolbar">
            <el-input
                v-model="inputCodes"
                type="textarea"
                :rows="2"
                placeholder="输入代码：600519, 00700, 510300 (支持逗号、空格或换行)"
                @keyup.enter.native="addNewCodes"
                style="flex:1">
            </el-input>
            <el-button type="primary" @click="addNewCodes" :loading="loading" style="height:auto">
                查询并追加
            </el-button>
        </div>

        <el-table
            :data="tableData"
            border
            height="100%"
            v-loading="loading"
            :row-class-name="tableRowClassName"
            style="width:100%">

            <el-table-column prop="name" label="名称/代码" min-width="150" fixed="left">
                <template #default="scope">
                    <div style="font-weight:bold">
                        <span :class="['market-tag','tag-'+getMarket(scope.row.fullCode)]">
                            {{getMarket(scope.row.fullCode).toUpperCase()}}
                        </span>
                        {{scope.row.name}}
                    </div>
                    <div style="font-size:11px;color:#909399;margin-left:32px">{{scope.row.fullCode}}</div>
                </template>
            </el-table-column>

            <el-table-column label="最新价" width="100">
                <template #default="scope">
                    <span :class="['price-now', scope.row.now >= scope.row.avg ? 'price-up' : 'price-down']">
                        {{scope.row.now}}
                    </span>
                </template>
            </el-table-column>

            <el-table-column label="E3·高点" width="110">
                <template #default="scope">
                    <el-input-number v-model="scope.row.high" :precision="3" :controls="false" size="small" @change="calculateRow(scope.row)" />
                </template>
            </el-table-column>

            <el-table-column label="D3·低点" width="110">
                <template #default="scope">
                    <el-input-number v-model="scope.row.low" :precision="3" :controls="false" size="small" @change="calculateRow(scope.row)" />
                </template>
            </el-table-column>

            <el-table-column label="分时均价" width="110">
                <template #default="scope">
                    <el-input-number v-model="scope.row.avg" :precision="3" :controls="false" size="small" @change="calculateRow(scope.row)" />
                </template>
            </el-table-column>

            <el-table-column label="常规买点(382)" width="100">
                <template #default="scope"><span class="fib-val">{{scope.row.f382}}</span></template>
            </el-table-column>

            <el-table-column label="强力支撑(618)" width="100">
                <template #default="scope"><span class="fib-val" style="color:#e6a23c">{{scope.row.f618}}</span></template>
            </el-table-column>

            <el-table-column label="黄金坑(786)" width="100">
                <template #default="scope"><span class="fib-val" style="color:#f56c6c">{{scope.row.f786}}</span></template>
            </el-table-column>

            <el-table-column label="压力/支撑">
                <template #default="scope">
                    <div class="red-text" style="font-size:12px">压: {{scope.row.topLine}}</div>
                    <div class="green-text" style="font-size:12px">支: {{scope.row.bottomLine}}</div>
                </template>
            </el-table-column>

            <el-table-column label="操作" width="50" fixed="right">
                <template #default="scope">
                    <el-button type="danger" size="small" link @click="removeItem(scope.$index)">删</el-button>
                </template>
            </el-table-column>
        </el-table>
    </div>
</div>

<script>
const { createApp, ref, onMounted, onBeforeUnmount, reactive } = Vue;

createApp({
    setup(){
        const STORAGE_KEY = "phi_batch_table_v5_fixed";
        const inputCodes = ref("");
        const tableData = ref([]);
        const loading = ref(false);
        const lastUpdateTime = ref("-");
        let autoTimer = null;

        const getMarket = (fullCode) => {
            if(fullCode.startsWith("sh")) return "sh";
            if(fullCode.startsWith("sz")) return "sz";
            if(fullCode.startsWith("hk")) return "hk";
            if(fullCode.startsWith("bj")) return "bj";
            return "other";
        };

        const tableRowClassName = ({row}) => {
            const now = parseFloat(row.now);
            if(!now || !row.f618) return '';
            if(now <= parseFloat(row.f786)) return 'danger-row';
            if(now <= parseFloat(row.f618)) return 'warning-row';
            return '';
        };

        const formatCode = (code) => {
            code = code.trim().toLowerCase();
            if(!code) return null;
            if(/^(sh|sz|hk|bj)/.test(code)) return code;
            if(/^\d+$/.test(code)){
                if(code.length <= 4 || (code.length === 5 && code.startsWith("0"))) return "hk" + code.padStart(5, "0");
                if(code.length === 6){
                    if(/^(5[168]|6)/.test(code)) return "sh" + code;
                    if(/^(1[568]|0|3)/.test(code)) return "sz" + code;
                    if(/^(4|8)/.test(code)) return "bj" + code;
                }
            }
            return code;
        };

        const fetchData = (codes, isAddition = true) => {
            if(codes.length === 0) return;
            loading.value = true;

            // --- 核心修复：添加随机时间戳 _t=... 破解浏览器缓存 ---
            const timestamp = new Date().getTime();
            const queryStr = codes.join(",");
            const scriptId = "jsonp-stock-script";
            
            // 清理旧脚本
            const old = document.getElementById(scriptId);
            if(old) old.remove();

            const script = document.createElement("script");
            script.id = scriptId;
            // 关键点：URL 携带动态参数
            script.src = `https://qt.gtimg.cn/q=${queryStr}&_t=${timestamp}`;
            
            script.onload = () => {
                setTimeout(() => {
                    codes.forEach(code => {
                        const dataStr = window[`v_${code}`];
                        if(!dataStr) return;
                        const d = dataStr.split("~");
                        const nowPrice = parseFloat(d[3]);
                        
                        // 计算均价
                        let turnover = parseFloat(d[37]);
                        let volume = parseFloat(d[36]);
                        let newAvg = 0;
                        if(code.startsWith("hk")){
                            newAvg = volume > 0 ? turnover / volume : parseFloat(d[4]);
                        } else {
                            newAvg = volume > 0 ? (turnover * 10000) / (volume * 100) : parseFloat(d[4]);
                        }

                        const idx = tableData.value.findIndex(x => x.fullCode === code);
                        if(idx > -1){
                            // 更新已有数据（刷新模式）
                            const item = tableData.value[idx];
                            item.now = nowPrice;
                            // 如果是后台自动刷新，通常不覆盖用户手动调整的高低点，除非是新添加
                            if(isAddition) {
                                item.avg = parseFloat(newAvg.toFixed(3));
                                item.high = parseFloat(d[33]) || nowPrice;
                                item.low = parseFloat(d[34]) || nowPrice;
                            }
                            calculateRow(item);
                        } else if(isAddition) {
                            // 添加新数据
                            const newItem = reactive({
                                name: d[1],
                                fullCode: code,
                                now: nowPrice,
                                high: parseFloat(d[33]) || nowPrice,
                                low: parseFloat(d[34]) || nowPrice,
                                avg: parseFloat(newAvg.toFixed(3)),
                                f382:0, f618:0, f786:0, topLine:0, bottomLine:0
                            });
                            calculateRow(newItem);
                            tableData.value.unshift(newItem);
                        }
                    });
                    
                    lastUpdateTime.value = new Date().toLocaleTimeString();
                    loading.value = false;
                    saveData();
                    // 清理全局变量释放内存
                    codes.forEach(code => delete window[`v_${code}`]);
                }, 100);
            };
            
            script.onerror = () => {
                loading.value = false;
                console.error("行情接口请求失败");
            };
            
            document.body.appendChild(script);
        };

        const addNewCodes = () => {
            const codes = inputCodes.value.split(/[,，\s\n]+/).map(formatCode).filter(Boolean);
            if(codes.length > 0) {
                fetchData(codes, true);
                inputCodes.value = "";
            }
        };

        const refreshAllPrices = () => {
            const current = tableData.value.map(x => x.fullCode);
            if(current.length > 0) fetchData(current, false);
        };

        const calculateRow = (row) => {
            const diff = row.high - row.low;
            const K = 0.98848;
            row.f382 = (row.high - diff * 0.382).toFixed(3);
            row.f618 = (row.high - diff * 0.618).toFixed(3);
            row.f786 = (row.high - diff * 0.786).toFixed(3);
            if(row.avg > 0){
                row.topLine = (row.avg / K).toFixed(3);
                row.bottomLine = (row.avg * K).toFixed(3);
            }
            saveData();
        };

        const saveData = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tableData.value));
        };

        const removeItem = (index) => {
            tableData.value.splice(index, 1);
            saveData();
        };

        const clearAll = () => {
            ElementPlus.ElMessageBox.confirm("确定清空所有自选股吗？").then(() => {
                tableData.value = [];
                localStorage.removeItem(STORAGE_KEY);
            }).catch(()=>{});
        };

        onMounted(() => {
            const cached = localStorage.getItem(STORAGE_KEY);
            if(cached) {
                tableData.value = JSON.parse(cached).map(x => reactive(x));
                refreshAllPrices();
            }
            autoTimer = setInterval(refreshAllPrices, 10000);
        });

        onBeforeUnmount(() => {
            if(autoTimer) clearInterval(autoTimer);
        });

        return {
            inputCodes, tableData, loading, lastUpdateTime,
            addNewCodes, refreshAllPrices, calculateRow, removeItem, clearAll,
            tableRowClassName, getMarket
        };
    }
}).use(ElementPlus).mount("#app");
</script>
</body>
</html>
