<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>牛股计算器终极版</title>

<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus"></script>

<style>
body{
background:linear-gradient(135deg,#0f172a,#0b1220);
margin:0;
padding:14px;
font-family:Inter,"Helvetica Neue",Arial;
height:100vh;
box-sizing:border-box;
overflow:hidden;
color:#e5e7eb;
}

#app{
height:100%;
display:flex;
flex-direction:column;
}

.app-container{
flex:1;
display:flex;
flex-direction:column;
background:rgba(17,24,39,.9);
backdrop-filter:blur(10px);
padding:20px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,.6);
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
}

.header-box{
margin-bottom:20px;
padding-bottom:14px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.header-box h2{
margin:0;
font-size:22px;
letter-spacing:1px;
background:linear-gradient(90deg,#38bdf8,#818cf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.toolbar{
margin-bottom:15px;
display:flex;
gap:12px;
align-items:flex-start;
}

.el-table{
background:transparent !important;
color:#e5e7eb;
}

.el-table th{
background:#1f2937 !important;
color:#94a3b8 !important;
font-weight:600;
border-bottom:1px solid rgba(255,255,255,.05);
}

.el-table tr{
background:transparent !important;
transition:all .15s ease;
}

.el-table tr:hover td{
background:rgba(255,255,255,.03) !important;
}

.el-table td{
border-bottom:1px solid rgba(255,255,255,.03);
}

.el-table .warning-row td{
background:rgba(251,191,36,.08) !important;
color:#fbbf24 !important;
}

.el-table .danger-row td{
background:rgba(234,179,8,.15) !important;
color:#facc15 !important;
}

.price-now{
font-weight:800;
font-size:16px;
letter-spacing:.5px;
}

.price-up{
color:#ef4444;
}

.price-down{
color:#22c55e;
}

.fib-val{
font-family:JetBrains Mono,Consolas,monospace;
font-size:13px;
font-weight:600;
color:#60a5fa;
}

.red-text{
color:#ef4444;
font-weight:700;
}

.green-text{
color:#22c55e;
font-weight:700;
}

.market-tag{
font-size:10px;
padding:2px 6px;
border-radius:8px;
margin-right:6px;
font-weight:600;
}

.tag-sh{background:#7f1d1d;color:#fecaca;}
.tag-sz{background:#1e3a8a;color:#bfdbfe;}
.tag-hk{background:#14532d;color:#bbf7d0;}
.tag-bj{background:#78350f;color:#fde68a;}

.el-input__wrapper,
.el-textarea__inner{
background:#1f2937 !important;
color:#fff !important;
border:1px solid rgba(255,255,255,.05) !important;
}

.el-input-number__decrease,
.el-input-number__increase{
background:#1f2937 !important;
color:#fff !important;
}

.el-button--primary{
background:linear-gradient(90deg,#2563eb,#38bdf8);
border:none;
}

.el-button--danger{
background:linear-gradient(90deg,#dc2626,#ef4444);
border:none;
}

.el-button:hover{
opacity:.9;
transform:translateY(-1px);
transition:all .2s;
}
</style>

</head>

<body>
<div id="app">
<div class="app-container">

<div class="header-box">
<div>
<h2>牛股计算器</h2>
<p style="margin:5px 0 0;font-size:13px;color:#94a3b8">
自动刷新：10秒 | 跌破0.618橘色 | 跌破0.786金色
</p>
</div>

<div>
<el-button-group>
<el-button type="primary" @click="refreshAllPrices" :loading="loading">
刷新行情
</el-button>

<el-button type="danger" @click="clearAll">
清空
</el-button>
</el-button-group>
</div>
</div>

<div class="toolbar">
<el-input
v-model="inputCodes"
type="textarea"
:rows="2"
placeholder="输入代码：600519, hk700, 510300"
@keyup.enter.native="handleInputEnter"
style="flex:1">
</el-input>

<div style="display:flex;flex-direction:column;gap:6px;">
<el-button type="primary"
@click="addNewCodes"
:loading="loading"
style="height:32px">
查询并追加
</el-button>

<el-button size="small" @click="openHistory">
历史记录
</el-button>
</div>
</div>

<el-table
:data="tableData"
border
height="100%"
v-loading="loading"
:row-class-name="tableRowClassName"
style="width:100%">

<el-table-column prop="name" label="名称/代码" min-width="150" fixed="left">
<template #default="scope">
<div style="font-weight:bold">
<span :class="['market-tag','tag-'+getMarket(scope.row.fullCode)]">
{{getMarket(scope.row.fullCode).toUpperCase()}}
</span>
{{scope.row.name}}
</div>
<div style="font-size:11px;color:#94a3b8;margin-left:32px">
{{scope.row.fullCode}}
</div>
</template>
</el-table-column>

<el-table-column label="最新价" width="110">
<template #default="scope">
<span 
:class="[
'price-now',
scope.row.avg && scope.row.now >= scope.row.avg 
? 'price-up' 
: 'price-down'
]">
{{scope.row.now}}
</span>
</template>
</el-table-column>

<el-table-column label="E3·高点" width="120">
<template #default="scope">
<el-input-number
v-model="scope.row.high"
:precision="3"
:controls="false"
size="small"
style="width:100%"
@change="calculateRow(scope.row)">
</el-input-number>
</template>
</el-table-column>

<el-table-column label="D3·低点" width="120">
<template #default="scope">
<el-input-number
v-model="scope.row.low"
:precision="3"
:controls="false"
size="small"
style="width:100%"
@change="calculateRow(scope.row)">
</el-input-number>
</template>
</el-table-column>

<el-table-column label="分时均价" width="120">
<template #default="scope">
<el-input-number
v-model="scope.row.avg"
:precision="3"
:controls="false"
size="small"
style="width:100%"
@change="calculateRow(scope.row)">
</el-input-number>
</template>
</el-table-column>

<el-table-column label="常规买点">
<template #default="scope">
<span class="fib-val">{{scope.row.f382}}</span>
</template>
</el-table-column>

<el-table-column label="618强撑">
<template #default="scope">
<span class="fib-val">{{scope.row.f618}}</span>
</template>
</el-table-column>

<el-table-column label="黄金坑">
<template #default="scope">
<span class="fib-val">{{scope.row.f786}}</span>
</template>
</el-table-column>

<el-table-column label="🔴 压力">
<template #default="scope">
<span class="red-text">{{scope.row.topLine}}</span>
</template>
</el-table-column>

<el-table-column label="🟢 支撑">
<template #default="scope">
<span class="green-text">{{scope.row.bottomLine}}</span>
</template>
</el-table-column>

<el-table-column label="操作" width="60" fixed="right" align="center">
<template #default="scope">
<el-button type="danger" size="small" link
@click="removeItem(scope.$index)">
删
</el-button>
</template>
</el-table-column>

</el-table>

</div>
</div>

<script>
const { createApp, ref, onMounted, onBeforeUnmount, reactive } = Vue;

createApp({
setup(){

const STORAGE_KEY="phi_batch_table_v5";
const HISTORY_KEY="phi_search_history_v5";

const inputCodes=ref("");
const tableData=ref([]);
const loading=ref(false);

const searchHistory=ref([]);
const historyDialogVisible=ref(false);

let autoTimer=null;

/* 历史 */
const loadHistory=()=>{
const cache=localStorage.getItem(HISTORY_KEY);
if(cache) searchHistory.value=JSON.parse(cache);
};

const addHistory=(text)=>{
if(!text) return;
let arr=searchHistory.value.filter(x=>x!==text);
arr.unshift(text);
searchHistory.value=arr.slice(0,20);
localStorage.setItem(HISTORY_KEY,JSON.stringify(arr.slice(0,20)));
};

const openHistory=()=>{
loadHistory();
historyDialogVisible.value=true;
};

const useHistoryItem=(item)=>{
inputCodes.value=item;
historyDialogVisible.value=false;
};

/* 市场 */
const getMarket=(fullCode)=>{
if(fullCode.startsWith("sh")) return "sh";
if(fullCode.startsWith("sz")) return "sz";
if(fullCode.startsWith("hk")) return "hk";
if(fullCode.startsWith("bj")) return "bj";
return "other";
};

const tableRowClassName=({row})=>{
const now=parseFloat(row.now);
if(isNaN(now)||!row.f618) return '';

if(now<=parseFloat(row.f786)) return 'danger-row';
if(now<=parseFloat(row.f618)) return 'warning-row';

return '';
};

/* 格式化代码 */
const formatCode=(code)=>{
code=code.trim().toLowerCase();
if(!code) return null;

if(/^(sh|sz|hk|bj)/.test(code)) return code;

if(/^\d+$/.test(code)){
if(code.length<=4 || (code.length===5 && code.startsWith("0"))){
return "hk"+code.padStart(5,"0");
}

if(code.length===6){
if(/^(5[168]|6)/.test(code)) return "sh"+code;
if(/^(1[568]|0|3)/.test(code)) return "sz"+code;
if(/^(4|8)/.test(code)) return "bj"+code;
}
}

return code;
};

/* JSONP行情 */
const fetchData=(codes,isAddition=true)=>{
if(codes.length===0) return;

loading.value=true;

const queryStr=codes.join(",");

const old=document.getElementById("jsonp-stock");
if(old) old.remove();

const script=document.createElement("script");
script.id="jsonp-stock";
script.src=`https://qt.gtimg.cn/q=${queryStr}`;
document.body.appendChild(script);

script.onload=()=>{
setTimeout(()=>{

codes.forEach(code=>{
const dataStr=window[`v_${code}`];
if(!dataStr) return;

const d=dataStr.split("~");

const nowPrice=parseFloat(d[3]);

let turnover=parseFloat(d[37]);
let volume=parseFloat(d[36]);

let newAvg=0;

if(code.startsWith("hk")){
newAvg=volume>0?turnover/volume:parseFloat(d[4]);
}else{
newAvg=volume>0?(turnover*10000)/(volume*100):parseFloat(d[4]);
}

const idx=tableData.value.findIndex(x=>x.fullCode===code);

if(idx>-1){
const item=tableData.value[idx];
item.now=nowPrice;

if(!item.avg||isAddition)
item.avg=parseFloat(newAvg.toFixed(3));

calculateRow(item);
}
else if(isAddition){

const newItem=reactive({
name:d[1],
fullCode:code,
now:nowPrice,
high:parseFloat(d[33])||nowPrice,
low:parseFloat(d[34])||nowPrice,
avg:parseFloat(newAvg.toFixed(3)),
f382:0,f618:0,f786:0,
topLine:0,bottomLine:0
});

calculateRow(newItem);
tableData.value.unshift(newItem);
}

});

loading.value=false;

if(isAddition){
addHistory(inputCodes.value);
inputCodes.value="";
}

},300);
};
};

const addNewCodes=()=>{
const codes=inputCodes.value
.split(/[,,\s\n]+/)
.map(formatCode)
.filter(Boolean);

if(codes.length>0){
fetchData(codes,true);
}
};

const handleInputEnter=()=>addNewCodes();

const refreshAllPrices=()=>{
const current=tableData.value.map(x=>x.fullCode);
if(current.length>0) fetchData(current,false);
};

/* 自动刷新 */
const startAutoRefresh=()=>{
stopAutoRefresh();
autoTimer=setInterval(refreshAllPrices,10000);
};

const stopAutoRefresh=()=>{
if(autoTimer){
clearInterval(autoTimer);
autoTimer=null;
}
};

const calculateRow=(row)=>{
const diff=row.high-row.low;
const K=0.98848;

row.f382=(row.high-diff*0.382).toFixed(3);
row.f618=(row.high-diff*0.618).toFixed(3);
row.f786=(row.high-diff*0.786).toFixed(3);

if(row.avg>0){
row.topLine=(row.avg/K).toFixed(3);
row.bottomLine=(row.avg*K).toFixed(3);
}

localStorage.setItem(STORAGE_KEY,JSON.stringify(tableData.value));
};

const removeItem=(index)=>{
tableData.value.splice(index,1);
localStorage.setItem(STORAGE_KEY,JSON.stringify(tableData.value));
};

const clearAll=()=>{
ElementPlus.ElMessageBox.confirm("确定清空吗？")
.then(()=>{
tableData.value=[];
localStorage.removeItem(STORAGE_KEY);
});
};

onMounted(()=>{
const cached=localStorage.getItem(STORAGE_KEY);
if(cached){
tableData.value=JSON.parse(cached).map(x=>reactive(x));
refreshAllPrices();
}

loadHistory();
startAutoRefresh();
});

onBeforeUnmount(()=>{
stopAutoRefresh();
});

return{
inputCodes,
tableData,
loading,
addNewCodes,
refreshAllPrices,
calculateRow,
removeItem,
clearAll,
tableRowClassName,
getMarket,
openHistory,
useHistoryItem,
handleInputEnter
};

}
}).use(ElementPlus).mount("#app");
</script>

</body>
</html>
