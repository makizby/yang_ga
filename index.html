<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>牛股计算器终极稳定版</title>

<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus"></script>

<style>
body{
background:#f0f2f5;
margin:0;
padding:12px;
font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
height:100vh;
box-sizing:border-box;
overflow:hidden;
}

#app{
height:100%;
display:flex;
flex-direction:column;
}

.app-container{
flex:1;
display:flex;
flex-direction:column;
background:#fff;
padding:20px;
border-radius:8px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
overflow:hidden;
}

.header-box{
flex-shrink:0;
margin-bottom:20px;
border-bottom:1px solid #ebeef5;
padding-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-box h2{
margin:0;
color:#409EFF;
font-size:22px;
}

.toolbar{
flex-shrink:0;
margin-bottom:15px;
display:flex;
gap:12px;
align-items:flex-start;
}

.el-table .warning-row td{
background:#fffaf3 !important;
color:#e6a23c !important;
}

.el-table .danger-row td{
background:linear-gradient(to right,#ffffff,#fff9e6) !important;
color:#b28f00 !important;
border-bottom:1px solid #ffd04b !important;
}

.red-text{color:#f56c6c;font-weight:bold;}
.green-text{color:#67c23a;font-weight:bold;}
.fib-val{
font-family:Monaco,Consolas,monospace;
font-size:13px;
font-weight:bold;
}

.price-now{
font-weight:800;
font-size:15px;
color:#303133;
}

.market-tag{
font-size:10px;
padding:0 4px;
border-radius:3px;
margin-right:4px;
}

.tag-sh{background:#fee;color:#f56c6c;border:1px solid #fcc;}
.tag-sz{background:#eef5ff;color:#409eff;border:1px solid #c6e2ff;}
.tag-hk{background:#f0f9eb;color:#67c23a;border:1px solid #c2e7b0;}
</style>

</head>

<body>
<div id="app">
<div class="app-container">

<div class="header-box">
<div>
<h2>牛股计算器</h2>
<p style="margin:5px 0 0;font-size:13px;color:#909399">
💡 自动刷新周期：10秒 | 橘色(跌破0.618) | 金色(跌破0.786黄金坑)
</p>
</div>

<div>
<el-button-group>
<el-button type="primary" @click="refreshAllPrices" :loading="loading">
刷新行情
</el-button>

<el-button type="danger" @click="clearAll">
清空列表
</el-button>
</el-button-group>
</div>
</div>

<div class="toolbar">
<el-input
v-model="inputCodes"
type="textarea"
:rows="2"
placeholder="输入代码：600519, hk700, 510300"
@keyup.enter.native="handleInputEnter"
style="flex:1">
</el-input>

<div style="display:flex;flex-direction:column;gap:6px;">
<el-button type="primary"
@click="addNewCodes"
:loading="loading"
style="height:32px">
查询并追加
</el-button>

<el-button size="small" @click="openHistory">
历史记录
</el-button>
</div>
</div>

<el-table
:data="tableData"
border
height="100%"
v-loading="loading"
:row-class-name="tableRowClassName"
style="width:100%">

<el-table-column prop="name" label="名称/代码" min-width="150" fixed="left">
<template #default="scope">
<div style="font-weight:bold">
<span :class="['market-tag','tag-'+getMarket(scope.row.fullCode)]">
{{getMarket(scope.row.fullCode).toUpperCase()}}
</span>
{{scope.row.name}}
</div>
<div style="font-size:11px;color:#909399;margin-left:32px">
{{scope.row.fullCode}}
</div>
</template>
</el-table-column>

<el-table-column label="最新价" width="100">
<template #default="scope">
<span class="price-now">{{scope.row.now}}</span>
</template>
</el-table-column>

<el-table-column label="E3·高点" width="120">
<template #default="scope">
<el-input-number
v-model="scope.row.high"
:precision="3"
:controls="false"
size="small"
style="width:100%"
@change="calculateRow(scope.row)">
</el-input-number>
</template>
</el-table-column>

<el-table-column label="D3·低点" width="120">
<template #default="scope">
<el-input-number
v-model="scope.row.low"
:precision="3"
:controls="false"
size="small"
style="width:100%"
@change="calculateRow(scope.row)">
</el-input-number>
</template>
</el-table-column>

<el-table-column label="分时均价" width="120">
<template #default="scope">
<el-input-number
v-model="scope.row.avg"
:precision="3"
:controls="false"
size="small"
style="width:100%"
@change="calculateRow(scope.row)">
</el-input-number>
</template>
</el-table-column>

<el-table-column label="常规买点" min-width="90">
<template #default="scope">
<span class="fib-val">{{scope.row.f382}}</span>
</template>
</el-table-column>

<el-table-column label="618强撑" min-width="90">
<template #default="scope">
<span class="fib-val">{{scope.row.f618}}</span>
</template>
</el-table-column>

<el-table-column label="黄金坑" min-width="90">
<template #default="scope">
<span class="fib-val">{{scope.row.f786}}</span>
</template>
</el-table-column>

<el-table-column label="🔴 日内压力" min-width="90">
<template #default="scope">
<span class="red-text">{{scope.row.topLine}}</span>
</template>
</el-table-column>

<el-table-column label="🟢 日内支撑" min-width="90">
<template #default="scope">
<span class="green-text">{{scope.row.bottomLine}}</span>
</template>
</el-table-column>

<el-table-column label="操作" width="60" fixed="right" align="center">
<template #default="scope">
<el-button type="danger" size="small" link
@click="removeItem(scope.$index)">
删
</el-button>
</template>
</el-table-column>

</el-table>

</div>
</div>

<!-- 历史弹窗 -->
<el-dialog title="搜索历史" v-model="historyDialogVisible" width="400px">
<el-empty v-if="searchHistory.length===0" description="暂无历史"></el-empty>

<div v-else style="max-height:300px;overflow:auto">
<el-button
v-for="item in searchHistory"
:key="item"
size="small"
style="margin:4px"
@click="useHistoryItem(item)">
{{item}}
</el-button>
</div>
</el-dialog>

<script>
const { createApp, ref, onMounted, onBeforeUnmount, reactive } = Vue;

createApp({
setup(){

const STORAGE_KEY="phi_batch_table_v5";
const HISTORY_KEY="phi_search_history_v5";

const inputCodes=ref("");
const tableData=ref([]);
const loading=ref(false);

const searchHistory=ref([]);
const historyDialogVisible=ref(false);

let autoTimer=null;

/* ---------- 历史记录 ---------- */
const loadHistory=()=>{
const cache=localStorage.getItem(HISTORY_KEY);
if(cache){
searchHistory.value=JSON.parse(cache);
}
};

const saveHistory=()=>{
localStorage.setItem(HISTORY_KEY,
JSON.stringify(searchHistory.value.slice(0,20)));
};

const addHistory=(text)=>{
if(!text) return;
let arr=searchHistory.value.filter(x=>x!==text);
arr.unshift(text);
searchHistory.value=arr.slice(0,20);
saveHistory();
};

const openHistory=()=>{
loadHistory();
historyDialogVisible.value=true;
};

const useHistoryItem=(item)=>{
inputCodes.value=item;
historyDialogVisible.value=false;
};

/* ---------- 行情逻辑 ---------- */
const tableRowClassName=({row})=>{
const now=parseFloat(row.now);
if(isNaN(now)||!row.f618) return '';

if(now<=parseFloat(row.f786)) return 'danger-row';
if(now<=parseFloat(row.f618)) return 'warning-row';

return '';
};

const getMarket=(fullCode)=>{
if(fullCode.startsWith("sh")) return "sh";
if(fullCode.startsWith("sz")) return "sz";
if(fullCode.startsWith("hk")) return "hk";
if(fullCode.startsWith("bj")) return "bj";
return "other";
};

onMounted(()=>{
const cached=localStorage.getItem(STORAGE_KEY);
if(cached){
tableData.value=JSON.parse(cached).map(x=>reactive(x));
refreshAllPrices();
}

loadHistory();
startAutoRefresh();
});

onBeforeUnmount(()=>{
stopAutoRefresh();
});

const saveToLocal=()=>{
localStorage.setItem(STORAGE_KEY,
JSON.stringify(tableData.value));
};

const formatCode=(code)=>{
code=code.trim().toLowerCase();
if(!code) return null;

if(/^(sh|sz|hk|bj)/.test(code)) return code;

if(/^\d+$/.test(code)){
if(code.length<=4 || (code.length===5 && code.startsWith("0"))){
return "hk"+code.padStart(5,"0");
}

if(code.length===6){
if(/^(5[168]|6)/.test(code)) return "sh"+code;
if(/^(1[568]|0|3)/.test(code)) return "sz"+code;
if(/^(4|8)/.test(code)) return "bj"+code;
}
}

return code;
};

/* ---------- JSONP行情刷新 ---------- */
const fetchData=(codes,isAddition=true)=>{
if(codes.length===0) return;

loading.value=true;

const queryStr=codes.join(",");

const old=document.getElementById("jsonp-stock");
if(old) old.remove();

const script=document.createElement("script");
script.id="jsonp-stock";
script.src=`https://qt.gtimg.cn/q=${queryStr}`;
document.body.appendChild(script);

script.onload=()=>{
// ⭐ 延迟读取 JSONP 结果（最稳定）
setTimeout(()=>{

codes.forEach(code=>{
const dataStr=window[`v_${code}`];
if(!dataStr) return;

const d=dataStr.split("~");

const nowPrice=parseFloat(d[3]);

let turnover=parseFloat(d[37]);
let volume=parseFloat(d[36]);

let newAvg=0;

if(code.startsWith("hk")){
newAvg=volume>0?turnover/volume:parseFloat(d[4]);
}else{
newAvg=volume>0?(turnover*10000)/(volume*100):parseFloat(d[4]);
}

const idx=tableData.value.findIndex(x=>x.fullCode===code);

if(idx>-1){
const item=tableData.value[idx];
item.now=nowPrice;

if(!item.avg||isAddition)
item.avg=parseFloat(newAvg.toFixed(3));

calculateRow(item);
}
else if(isAddition){

const newItem=reactive({
name:d[1],
fullCode:code,
now:nowPrice,
high:parseFloat(d[33])||nowPrice,
low:parseFloat(d[34])||nowPrice,
avg:parseFloat(newAvg.toFixed(3)),
f382:0,f618:0,f786:0,
topLine:0,bottomLine:0
});

calculateRow(newItem);

tableData.value.unshift(newItem);
}

});

loading.value=false;
saveToLocal();

if(isAddition){
addHistory(inputCodes.value);
inputCodes.value="";
}

},300);
};
};

const addNewCodes=()=>{
const codes=inputCodes.value
.split(/[,,\s\n]+/)
.map(formatCode)
.filter(Boolean);

if(codes.length>0){
fetchData(codes,true);
}
};

const handleInputEnter=()=>{
addNewCodes();
};

const refreshAllPrices=()=>{
const current=tableData.value.map(x=>x.fullCode);
if(current.length>0) fetchData(current,false);
};

/* ---------- 自动刷新 ---------- */
const startAutoRefresh=()=>{
stopAutoRefresh();
autoTimer=setInterval(()=>{
refreshAllPrices();
},10000);
};

const stopAutoRefresh=()=>{
if(autoTimer){
clearInterval(autoTimer);
autoTimer=null;
}
};

const calculateRow=(row)=>{
const diff=row.high-row.low;
const K=0.98848;

row.f382=(row.high-diff*0.382).toFixed(3);
row.f618=(row.high-diff*0.618).toFixed(3);
row.f786=(row.high-diff*0.786).toFixed(3);

if(row.avg>0){
row.topLine=(row.avg/K).toFixed(3);
row.bottomLine=(row.avg*K).toFixed(3);
}

saveToLocal();
};

const removeItem=(index)=>{
tableData.value.splice(index,1);
saveToLocal();
};

const clearAll=()=>{
ElementPlus.ElMessageBox.confirm("确定清空所有数据吗？")
.then(()=>{
tableData.value=[];
saveToLocal();
});
};

return{
inputCodes,
tableData,
loading,
searchHistory,
historyDialogVisible,
addNewCodes,
refreshAllPrices,
calculateRow,
removeItem,
clearAll,
tableRowClassName,
getMarket,
openHistory,
useHistoryItem,
handleInputEnter
};

}
}).use(ElementPlus).mount("#app");
</script>

</body>
</html>
